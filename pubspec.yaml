name: liquid_glow
description: >
  High-performance, shader-driven fluid glow backgrounds and an iOS
  18-style Siri screen-edge glow effect for Flutter, powered by Impeller
  fragment shaders.
version: 0.2.0
homepage: https://github.com/ibrokhimal/liquid_glow
repository: https://github.com/ibrokhimal/liquid_glow

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  shaders:
    - shaders/liquid_fluid.frag
    - shaders/siri_edge.frag
    - shaders/liquid_orbs.frag
    - shaders/liquid_shapes.frag
